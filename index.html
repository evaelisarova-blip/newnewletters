<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuffled Letters Archive</title>

<style>
:root{
  --bg:#f7f7f2;
  --text:#000000;
  --muted:#8a8a8a;
  --line:#dcdcdc;
  --window:#ffffff;
  --shadow:0 8px 20px rgba(0,0,0,0.1);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  font-family:monospace;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* LEFT SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:260px;
  height:100vh;
  padding:20px;
  border-right:1px dashed var(--line);
  font-size:12px;
  background:var(--bg);
  z-index:20;
}

.logo{
  margin-bottom:18px;
  font-size:14px;
  line-height:1.1;
}

.sidebar p{
  line-height:1.35;
  margin:0 0 18px 0;
}

.archive-controls{
  margin-bottom:16px;
}

.sidebar-btn{
  display:block;
  width:100%;
  text-align:left;
  background:none;
  border:1px solid var(--text);
  color:var(--text);
  padding:7px 10px;
  margin:0 0 8px 0;
  cursor:pointer;
  font-family:monospace;
  font-size:12px;
}

.sidebar-btn:hover{
  background:var(--text);
  color:#fff;
}

.archive{
  margin-top:10px;
  max-height:58vh;
  overflow:auto;
  padding-right:6px;
}

.archive-item{
  display:block;
  width:100%;
  text-align:left;
  background:none;
  border:none;
  color:var(--text);
  padding:0;
  margin:0 0 7px 0;
  cursor:pointer;
  font-family:monospace;
  font-size:12px;
  line-height:1.35;
}

.archive-item:hover{
  text-decoration:underline;
}

.footer{
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  font-size:11px;
  line-height:1.45;
}

/* MAIN GRID */
.main{
  margin-left:260px;
  height:100vh;
  position:relative;
  overflow:auto;
}

.timeline-canvas{
  position:relative;
  min-height:2200px;
}

.grid-line{
  position:absolute;
  top:0;
  height:100%;
  border-left:1px dashed var(--line);
}

.year{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:#999;
  z-index:1;
}

.month{
  position:absolute;
  top:18px;
  font-size:12px;
  color:var(--text);
  z-index:1;
}

/* FLOATING WORDS */
.word{
  position:absolute;
  font-size:12px;
  opacity:0.5;
  pointer-events:none;
  user-select:none;
  color:var(--text);
}

/* WINDOW */
.window{
  position:absolute;
  top:420px;
  left:420px;
  width:560px;
  background:var(--window);
  border:1px solid #cfcfcf;
  box-shadow:var(--shadow);
  z-index:10;
}

.window-header{
  height:24px;
  background:linear-gradient(#ececec,#dddddd);
  display:flex;
  align-items:center;
  padding:0 8px;
  cursor:move;
  user-select:none;
}

.dots{
  display:flex;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  background:#9d9d9d;
  border-radius:50%;
}

.title{
  margin:auto;
  font-size:10px;
  color:#555;
}

.window-body{
  padding:18px 20px 20px 20px;
  font-size:12px;
  line-height:1.6;
  max-height:72vh;
  overflow:auto;
  background:#fff;
}

/* FORM + BUTTONS */
input{
  width:100%;
  border:none;
  border-bottom:1px solid #aaa;
  background:none;
  padding:6px 0;
  color:var(--text);
  font-family:monospace;
  font-size:12px;
  outline:none;
}

button{
  margin-top:10px;
  border:1px solid var(--text);
  background:none;
  color:var(--text);
  padding:6px 10px;
  cursor:pointer;
  font-family:monospace;
  font-size:12px;
}

button:hover{
  background:var(--text);
  color:#fff;
}

.meta{
  color:#999;
  margin-bottom:12px;
  font-size:11px;
}

pre{
  white-space:pre-wrap;
  font-family:monospace;
  font-size:12px;
  line-height:1.6;
  margin:0;
}

.small-actions{
  margin-top:14px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.note{
  margin-top:10px;
  color:#999;
  font-size:11px;
}

.cursor{
  animation:blink 1s steps(1) infinite;
}

@keyframes blink{
  0%,49% { opacity:1; }
  50%,100% { opacity:0; }
}

@media (max-width: 900px){
  .sidebar{ width:220px; }
  .main{ margin-left:220px; }
  .window{ width:440px; }
}

@media (max-width: 700px){
  .sidebar{
    position:relative;
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px dashed var(--line);
  }
  .main{
    margin-left:0;
    height:calc(100vh - 280px);
  }
  .window{
    width:90vw;
    left:5vw !important;
    top:20px !important;
  }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">/\\__—|-.-</div>

  <p>
    A radically transparent archive<br>
    of correspondence turned into code.
  </p>

  <div class="archive-controls">
    <button class="sidebar-btn" id="openGeneratorBtn">generate letter</button>
    <button class="sidebar-btn" id="openIntroBtn">about</button>
  </div>

  <div class="archive" id="archiveList"></div>

  <div class="footer">
    anonymized archive<br>
    generator mode enabled
  </div>
</div>

<div class="main" id="mainScroller">
  <div class="timeline-canvas" id="timelineCanvas">
    <div class="year">2025</div>
  </div>
</div>

<div class="window" id="window">
  <div class="window-header" id="windowHeader">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="title" id="windowTitle">archive</div>
  </div>

  <div class="window-body" id="content">
    Click any letter from the archive on the left, or open the generator.
  </div>
</div>

<script>
/* DOM */
const timelineCanvas = document.getElementById('timelineCanvas');
const archiveList = document.getElementById('archiveList');
const content = document.getElementById('content');
const windowTitle = document.getElementById('windowTitle');
const openGeneratorBtn = document.getElementById('openGeneratorBtn');
const openIntroBtn = document.getElementById('openIntroBtn');

/* GRID */
for(let i=1;i<6;i++){
  const line = document.createElement('div');
  line.className = 'grid-line';
  line.style.left = (i * 18) + '%';
  line.style.height = '2200px';
  timelineCanvas.appendChild(line);
}

const months = ['Sep','Aug','Jul','Jun','May'];
months.forEach((m,i)=>{
  const month = document.createElement('div');
  month.className = 'month';
  month.textContent = m;
  month.style.left = (8 + i * 18) + '%';
  timelineCanvas.appendChild(month);
});

/* GENERATOR DATA */
const phrasePool = [
  'I miss you.',
  'I think of you a lot.',
  'It was very weird not having a weekend with you.',
  'I like missing you.',
  'It’s romantic.',
  'There’s a soft sadness in it.',
  'What I feel most often lately is love.',
  'There’s less pressure. Just space.',
  'I feel like I can trust you.',
  'Thank you for the softness.',
  'You’ve been so steady with me.',
  'I enjoy our time together.',
  'Sometimes it hits me suddenly.',
  'This wave of wanting to be with you.',
  'Seeing you made me happy.',
  'Hearing from you made me happy.',
  'There’s something sacred about normal things.',
  'All I need is someone I trust.',
  'Writing to you helps.',
  'It gives shape to the noise.',
  'I feel a little off.',
  'It was quiet. That was the goal.',
  'Every day is a new day I guess.',
  'I just carry it.',
  'Like a thread stitched gently through every day.',
  'I realized I had nothing to complain about.',
  'Not in a forced way, but in a quiet way.',
  'There is a kind of stillness.',
  'And within that stillness, love moves more freely.',
  'I think this is real.',
  'It doesn’t feel like a coincidence.',
  'I don’t need to worry.',
  'It just is.',
  'I wanted to tell you this.',
  'I don’t know why exactly.',
  'But it felt important.',
  'Even if it’s simple.',
  'Even if it’s obvious.',
  'Still.',
  'I nodded a lot, which felt like the correct response.',
  'Closure had clearly been outsourced.',
  'The only ones who still seem to have it figured out are the cats.',
  'Unbothered. Self-sufficient. Still running the show.',
  'Plans feel less like plans and more like vague suggestions.',
  'The design turned out experimental.',
  'More of a symbolic gesture than a functional object.',
  'Like the movie was bad for us, specifically.',
  'It felt oddly communal.',
  'I think I might be in my dessert prime right now.',
  'Dogs are good at that, I guess.',
  'I am just rambling in this email.',
  'I am a busy adult, not a lovesick teenager.',
  'My memory is mush.',
  'Everything is so mush.',
  'Big adventure, small sleep.',
  'That is the version of me you’re getting today.',
  'That’s all folks!',
  'More is more.',
  'I was going to say something meaningful but lost it halfway.',
  'This felt important five minutes ago.',
  'I stand by the emotion, not the structure.',
  'I think you would have laughed at this.',
  'This is probably not helping but I’m sending it anyway.',
  'Somehow this became sincere.',
  'I didn’t plan to say this but here we are.',
  'It feels small but also not small.',
  'I am aware this is slightly ridiculous.',
  'But also kind of true.',
  'I think this counts as communication.',
  'Emotionally this made sense at the time.'
];

const wordPool = [
  'love','stillness','distance','voice','thread','softness','clarity','weekend','memory','peace',
  'ordinary','sacred','noise','echo','romantic','waiting','letter','tenderness','weather','city',
  'pause','shape','warmth','trust','tired','light','absence','presence','quiet','screen',
  'mailbox','room','feeling','affection','chaos','detail','routine','future','name','gesture',
  'truth','longing','space','window','face','day','mush','cats','symbolic','experimental',
  'unbothered','vague','dessert','prime','communal','reply'
];

/* ARCHIVE DATA
   Paste your full redacted archive text between the backticks.
*/
const rawArchive = `
===== LETTER 01 =====
Dear A,

I miss you.

===== LETTER 02 =====
Dear B,

It is romantic.
`;
function parseArchive(raw) {
  const parts = raw.split('===== LETTER');
  const letters = [];

  for (let i = 1; i < parts.length; i++) {
    let block = parts[i].trim();

    const firstNewline = block.indexOf('\n');
    if (firstNewline !== -1) {
      block = block.slice(firstNewline + 1).trim();
    }

    const lines = block.split('\n');
    const cleanedLines = [];

    for (let line of lines) {
      const trimmed = line.trim();

      if (
        trimmed === '[date]' ||
        trimmed.startsWith('from:') ||
        trimmed.startsWith('to:')
      ) {
        continue;
      }

      cleanedLines.push(line);
    }

    const cleaned = cleanedLines.join('\n').trim();
    const firstLine = cleanedLines.find(line => line.trim()) || `Letter ${i}`;

    letters.push({
      id: i,
      title: `Letter ${String(i).padStart(2, '0')} — ${firstLine.slice(0, 42)}`,
      body: cleaned
    });
  }

  return letters;
}
const archiveLetters = parseArchive(rawArchive);
  console.log('archiveLetters:', archiveLetters);

function escapeHtml(str) {
  return str
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

/* ARCHIVE LIST */
function renderArchiveList(){
  archiveList.innerHTML = '';

  if (!archiveLetters.length) {
    const empty = document.createElement('div');
    empty.className = 'note';
    empty.textContent = 'archive is empty — rawArchive was not parsed';
    archiveList.appendChild(empty);
    return;
  }

  archiveLetters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'archive-item';
    btn.textContent = letter.title;
    btn.addEventListener('click', () => openLetter(letter.id));
    archiveList.appendChild(btn);
  });
}

function getLetterById(id){
  return archiveLetters.find(l => l.id === id);
}

function openLetter(id){
  const letter = getLetterById(id);
  if(!letter) return;

  windowTitle.textContent = 'letter';
  content.innerHTML = `
    <div class="meta">${escapeHtml(letter.title)}</div>
    <pre>${escapeHtml(letter.body)}</pre>
    <div class="note">anonymized archive view</div>
  `;
}

/* GENERATOR */
function clearWords(){
  document.querySelectorAll('.word').forEach(word => word.remove());
}

function generateWords(){
  clearWords();

  for(let i = 0; i < 120; i++){
    const span = document.createElement('span');
    span.className = 'word';
    span.innerText = randomItem(wordPool);
    span.style.top = Math.random() * 2100 + 'px';
    span.style.left = Math.random() * (timelineCanvas.offsetWidth - 80) + 'px';
    timelineCanvas.appendChild(span);
  }
}

function openGenerator(){
  windowTitle.textContent = 'generator';

  content.innerHTML = `
    <div class="meta">generated letter</div>
    <div>enter a name</div>
    <input id="nameInput" placeholder="Anna" />
    <div class="small-actions">
      <button onclick="startWordSequence()">generate</button>
    </div>
    <div class="note">the words will briefly scatter before the letter appears</div>
  `;
}

function startWordSequence(){
  const input = document.getElementById('nameInput');
  const name = input ? input.value.trim() : 'you';

  generateWords();

  setTimeout(() => {
    clearWords();
    generateLetter(name || 'you');
  }, 3000);
}

function generateLetter(name){
  const used = new Set();

  function pickUnique(){
    const available = phrasePool.filter(p => !used.has(p));
    const chosen = available.length
      ? available[Math.floor(Math.random() * available.length)]
      : phrasePool[Math.floor(Math.random() * phrasePool.length)];
    used.add(chosen);
    return chosen;
  }

  const body = [
    pickUnique(),
    pickUnique(),
    pickUnique(),
    pickUnique(),
    pickUnique(),
    pickUnique(),
    'I miss you.'
  ].join(' ');

  const finalLetter = `Dear ${name},

${body}

Yours,`;

  windowTitle.textContent = 'generated letter';
  content.innerHTML = `
    <div class="meta">generator output</div>
    <pre id="typedLetter"></pre>
    <div class="small-actions">
      <button onclick="openGenerator()">generate another</button>
    </div>
  `;

  typeLetter(finalLetter);
}

function typeLetter(text){
  const target = document.getElementById('typedLetter');
  if(!target) return;

  let i = 0;
  target.innerHTML = '';

  const interval = setInterval(() => {
    i += 1;
    const shown = escapeHtml(text.slice(0, i));
    target.innerHTML = shown + '<span class="cursor">|</span>';

    if(i >= text.length){
      clearInterval(interval);
      target.textContent = text;
    }
  }, 16);
}

/* INTRO */
function openIntro(){
  windowTitle.textContent = 'about';
  content.innerHTML = `
    <div class="meta">about this archive</div>
    <pre>A real e-mail correspondence between two people, one in Zurich and the other in Tiflis, was reduced to symbols, counted, broken apart, and returned as language again.

The letters were shuffled into unstable combinations and asked to gather themselves back into love letters.

The archive on the left contains anonymized letters.
The generator produces new letters from recurring phrases.</pre>
  `;
}

/* DRAGGABLE WINDOW */
const windowEl = document.getElementById('window');
const windowHeader = document.getElementById('windowHeader');

let isDragging = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

windowHeader.addEventListener('mousedown', (e) => {
  isDragging = true;
  const rect = windowEl.getBoundingClientRect();
  dragOffsetX = e.clientX - rect.left;
  dragOffsetY = e.clientY - rect.top;

  windowEl.style.transform = 'none';
  windowEl.style.left = rect.left + 'px';
  windowEl.style.top = rect.top + 'px';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  windowEl.style.left = (e.clientX - dragOffsetX) + 'px';
  windowEl.style.top = (e.clientY - dragOffsetY) + 'px';
});

document.addEventListener('mouseup', () => {
  isDragging = false;
});

/* EVENTS */
openGeneratorBtn.addEventListener('click', openGenerator);
openIntroBtn.addEventListener('click', openIntro);

/* INIT */
renderArchiveList();
openIntro();
</script>

</body>
</html>
