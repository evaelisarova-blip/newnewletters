<style>
:root{

*{box-sizing:border-box}

html,body{

body{

/* LEFT SIDEBAR */

.archive-controls{

}

.sidebar-btn:hover{

}

.archive{

.footer{

.main{

}

.timeline-canvas{

}

.grid-line{

  top:0;
  height:100%;

}

.year{
  position:absolute;
  top:6px;
  left:50%;

  font-size:12px;
  color:#999;
  z-index:1;
}

.month{
  position:absolute;
  top:18px;
  font-size:12px;
  color:var(--text);
  z-index:1;
}

/* FLOATING WORDS */
.word{
  position:absolute;
  font-size:12px;
  opacity:0.5;
  pointer-events:none;
  user-select:none;
  color:var(--text);
}

/* WINDOW */
.window{
  position:absolute;
  top:420px;
  left:420px;
  width:560px;
  background:var(--window);
  border:1px solid #cfcfcf;
  box-shadow:var(--shadow);
  z-index:10;
}

.window-header{
  height:24px;
  background:linear-gradient(#ececec,#dddddd);
  display:flex;
  align-items:center;
  padding:0 8px;
  cursor:move;
  user-select:none;
}

.dots{
  display:flex;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  background:#9d9d9d;
  border-radius:50%;
}

.title{
  margin:auto;
  font-size:10px;
  color:#555;
}

.window-body{
  padding:18px 20px 20px 20px;
  font-size:12px;
  line-height:1.6;
  max-height:72vh;
  overflow:auto;
  background:#fff;
}

/* FORM + BUTTONS */
input{
  width:100%;
  border:none;
  border-bottom:1px solid #aaa;
  background:none;
  padding:6px 0;
  color:var(--text);
  font-family:monospace;
  font-size:12px;
  outline:none;
}

button{
  margin-top:10px;
  border:1px solid var(--text);
  background:none;
  color:var(--text);
  padding:6px 10px;
  cursor:pointer;
  font-family:monospace;
  font-size:12px;
}

button:hover{
  background:var(--text);
  color:#fff;
}

.meta{
  color:#999;
  margin-bottom:12px;
  font-size:11px;
}

pre{
  white-space:pre-wrap;
  font-family:monospace;
  font-size:12px;
  line-height:1.6;
  margin:0;
}

.small-actions{
  margin-top:14px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.note{
  margin-top:10px;
  color:#999;
  font-size:11px;
}

.cursor{
  animation:blink 1s steps(1) infinite;
}

@keyframes blink{
  0%,49% { opacity:1; }
  50%,100% { opacity:0; }
}

@media (max-width: 900px){
  .sidebar{ width:220px; }
  .main{ margin-left:220px; }

@media (max-width: 700px){
  .sidebar{

    height:auto;
    border-right:none;

  .main{
    margin-left:0;
    height:calc(100vh - 280px);
  }
  .window{
    width:90vw;
    left:5vw !important;
    top:20px !important;
  }
}

===== LETTER 03 =====
[date]

█████, 

On Saturday evening, the 17th, I went on a picnic with some friends. We ended up by a lake. The view was very beautiful. I brought my sketchbook with me, but instead of drawing, I sat quietly and stared at a pine tree for twenty minutes. 

Lately, I’ve been taking more and more pictures—maybe because it helps me hold onto the way things feel right now. I’ve been feeling peaceful. I think it’s because I get to talk to the people I love again. Every day, people I missed. There’s a soft sadness in it, of course—that we had to go our separate ways for a while—but that’s also part of growing up. We all have our jobs now, our new homes—some in █████, some in Europe. And we’ve changed. Even our conversations are different. They ask me how I feel about the move, how I picture myself in █████.

Lately, I’ve been noticing how a person shifts when placed somewhere new—how the self rearranges, almost imperceptibly, according to place. In █████, I move one way; in █████, another. It’s not that either is untrue. It’s just that the surroundings—language, rhythm, the way the light falls on the street—pull different parts of me forward.

It’s a strange thing. To feel, in some subtle way, as though you’ve stepped slightly aside from the version of yourself that once seemed fixed. As if, in changing cities, you’ve quietly split from that earlier face, left it behind like a coat draped over a chair. You speak differently, think differently, not out of effort but because the world around you speaks and thinks differently too. It seeps in.

For a while, I didn’t know what to make of this. I kept looking for the thread that would tie everything together, trying to decide which self was the original. But now, I don’t think like that anymore. There’s no need to choose. Both are mine. I’ve stopped measuring them against one another. I’ve stopped resisting the shape change. The anxiety I once carried—constant, humming—has quieted. Not disappeared, but softened at the edges. I don’t feel pulled apart by expectations anymore. There’s less pressure. Just space. Just a kind of stillness. And within that stillness, love moves more freely. It doesn’t cling to a city for a moment. It exists in both places—in the conversations, in the pauses, in what is carried rather than spoken.

What I feel most often lately is love. Not just toward others, but moving through me, around me. It doesn’t belong to one place or moment. And yet—there are certain people who anchor that feeling in a different way. With some, it’s friendship. With you it’s something that holds. Around you—not even in the physical matter—around the thoughts of you, affection becomes less about needing and more about knowing. There’s no push or pull to it—it just is. And maybe that’s why I don’t feel the need to worry anymore. Not when I think about you. There’s something in the way I think of you, even when we’re apart, that makes everything feel steadier. I just carry it, like a thread stitched gently through every day.

Socializing here has become strangely effortless. There’s always someone to talk to or something to join. Which is good, mostly. But now, at the end of my second week, I’m realizing that being constantly surrounded by people might be its own kind of problem. I miss having time that isn’t performative, or scheduled, or, you know, a group activity.

Also, an unexpected development: I’ve started to suspect my friends think you’re not real.

I’ll mention you in a totally normal way during a conversation with someone and immediately I get this look. It’s the same one people give when someone at a dinner party says, “I used to be a child chess prodigy,” and everyone goes, “Okay.” I think some of my friends suspect you’re a clever cover story I’m using to dodge random men in a club. They don’t say it out loud, of course. There’s a subtle pause. A slight narrowing of the eyes. And then, very politely:

“So.. you say you have a boyfriend.. In… █████?”

“Yes.”

“And he is super hot, you say?”

“Yes, most definitely.” 

“And he’s also, quote, ‘a god in freestyle’?”

“Some would say elite.”

“And he is okay to wait for you?” 

“I hope so.” (This is where my voice gets shakier.)

“Well.. sure.” 

Overall, the week was very busy. 

On Monday, we had a movie night at the flat and watched █████ on a projector. Around ten people came. I mean we thought that it would be scary but it was hilarious – I guess that happens every time you watch a horror movie with a bunch of friends. At the end, we all agreed that it was a bad movie, but in a way that made the night better. Like the movie was bad for us, specifically. It felt oddly communal.

Then, on Tuesday, I modeled for a friend’s project—it was my first time doing something like that. He’s submitting the photos for a competition. He sent me the final results already, and they turned out ok.

Honestly, I kind of got attached to her. Dogs are good at that, I guess.

Later, I met up with a friend and we went sketching. I did some sketching in █████ too, but I’m not sure if I like how I’m drawing these days. And now we are going to watch “█████” with the same group of people we have watched “█████” with. I hope it will be scarier. 

I’m attaching photos of me I like from this week. Just so you remember what my face looks like in case it’s starting to fade. It’s hard to say how long it takes to forget someone’s face, but I imagine it’s faster than people think.

Also — maybe we could have a phone call sometime. Honestly, there are moments where I want to hear your voice, so I figured I should just say it.

█████ told me to start looking for a WG, and honestly, I’m kind of lost. She even added me to this chat full of rental listings, but everything — even just a single room — costs at least 900 CHF. I swear, I felt a little dead inside scrolling through it all.

Do you know if there are any Facebook groups or other places I could check out? I’d love to hear where you looked when you were searching for a WG. Any tips would be really helpful.

I’ll leave it here. Just know I’m thinking of you, in the way people do when they want to share the small stuff. Send you kisses. 

█████

Dear █████,

Statistically speaking, I should be doing fine. But subjectively, I feel like a malfunctioning soda machine—technically operational, but constantly dispensing the wrong beverage. There’s this internal pressure, like I’m storing anxiety in the same compartment where optimism used to live. I probably just need to reboot or something. There’s this anxious buzz in me I can’t quite shake off. It’s like I’ve absorbed too many conversations, moods, half-formed thoughts, and now they’re all swirling around in my head like a crowded waiting room where no one’s being called in. I think writing to you helps. It gives shape to the noise.

Today I went to the ceramic studio I told you about—█████’s place. I tried to focus on the clay, on the feeling of doing something slow and tactile, but I kept drifting. Still, it was nice to be somewhere calm. I also visited █████—she’s sick. I brought her strawberries and cookies. She eats her strawberries the same way every time—with sugar and milk. Honestly, if █████ were a dish, that’s exactly what she’d be. It’s oddly comforting to associate people with foods. We watched █████ █████ together, and wow—what a subtle, aching movie. It didn’t knock me over, but it lingered. It left me with this unsettled softness, like finishing a letter you didn’t want to end. I walked home with that strange tight feeling in my chest that’s neither sadness nor joy, just… presence. Like being too awake in your own life. While we were watching, and later talking about relationships (█████’s going through a tough patch), I realized I had nothing to complain about. Not in the forced “I guess things are okay” way, but in the quiet, honest way. You’ve been so steady with me, even from far away. And it made me think: thank you. Thank you for making this distance not feel like some cliff edge I’m peering over. Thank you for the softness. For the clarity. For never making me question where I stand with you. That’s more rare than people admit.

Other areas of my life are less clear. Honestly, I couldn’t tell you what I did on Tuesday or Thursday or maybe even Wednesday. I know I did things. I went places. I used verbs. But it’s like trying to remember a dream you were never fully in. Lately my thoughts come and go so fast I feel like I’m just waving at them from a passing train window. Every now and then I try to catch one, but mostly I let them go. Sunday night, after our call, I went to a party. It was good—good music — I have danced for the most of the set even when I was alone. For a little while, I felt like someone fully existing. Also, we started drinking with some group of the french students, that was fun. But when I got home, the silence hit me like a draft under the door. I cried—not from sadness, but more like a system reset. A brief check-in with my humanity. Still works.

I think I’m craving something I don’t have words for yet. Maybe routine. Maybe rest. Maybe a break from the constant improvisation that is my current life. I don’t want things to be boring—I just want to be able to tell what day it is without guessing. I know it’ll come. I’m moving toward it, one disjointed, hopeful step at a time.

And about these letters… yes, I talk about missing you a lot. But what else are love letters for, if not to tell someone you wish they were closer than they are? These are our little pocket conversations, folded into paragraphs. And every time I get one from you, it feels like someone turned the volume down on the chaos just enough for me to hear myself breathe. You write with such care. You’re sincere in a way that still surprises me, and I don’t mean that as doubt—I mean it as awe. Why do we care so much, so quickly? But then I remember waking up next to you. And I stop asking the question. It makes sense in a way logic can’t fully explain. That’s how I know it’s real.

Anyway, I know this email might come off as a bit dramatic. It’s not intentional. It’s just the mood I’m in right now. There’s rain, I’m tired, I watched a movie that was sort of quiet and emotional, and now I’m here writing to you, and everything feels a little heavier than usual—but not in a bad way. Just heavier. That said, tomorrow I might feel completely different. Sometimes I wake up and the things that felt important the night before suddenly don’t even register. So this email is basically a snapshot of whatever combination of weather, thoughts, and slightly undercooked emotions happened to be active today. That’s all.

These is some random staff that made me happy this week: 

So this is my letter. It’s not ideal—kind of emotionally mushy in places—but it is what it is. That’s the version of me you’re getting today.

Talk soon and kisses and other staff,

█████

P.S. I don’t know if we should plan our phone calls in advance. I kind of like it when you just call me some random evening when you have time. It feels more natural that way. So call me when you feel like it. I’ll be available for you.

tructure for a while — not officially, but in the way I relied on them. And even though that time is over, it left something behind. I still don’t feel totally settled anywhere. Whether I’m in █████ or wherever else, there’s always this small disconnect. Like I’m visiting, even if I’m staying. I don’t think that will go away until I decide something is “home.” But until then, knowing I have these people — even if they’re not physically close — makes that feeling easier to carry. That’s all. Just felt like writing it out.

The next day we were supposed to have breakfast at █████ and █████’s place. I don’t think you’ve met them, but they are also from █████. Judith and Freddy (who, like Enya, finished their studies at the same time as me) were staying at their place. I decided to sleep in though. When I went downstairs, Enya was already long gone! What can I say, I need my sleep. Funny anecdote: Apparently, when she got up, there was Benedict and he greeted her in such a bizarre way, that Enya thought I had not told my roommates, she was staying here. Needless to say, I did tell Benedict beforehand.

████████████████████████████████████████████████████████████

From there, we headed to Lettensteg, to meet the █████, █████, Judith, Enya and Freddy! By the time we arrived, they were already done swimming.  I used this chance to present my new front flip skills (they didn’t look) and taught █████ and █████ the backwards-header. I like goofing around a body of water with my buddies. It’s the same kind of being in the world, as when I was a child: Leave the house to go play; No sense, just nonsense.

The others headed to █████ and Thilos home for dinner. █████, █████ and I joined them after having drunk a beer in the sun. When we arrived, it was already dark and everybody had finished their food. The table was nicely set. They each had a Campari Spritz in front of them. We came in with two packs of canned beer and sat down at the edge. █████ and █████ kept handing us plates with leftovers and we gulfed it all down. We really did seem like little kids then, coming home from a day of roaming the streets, hungry as hell.

Around midnight, we went to the Brupbacherplatzfest again. This time though, a DJ was playing. That was one of the most unconventional sets I heard in my life, because it might swell have been the Spotify queue at a houseparty. I mean that in the best sense though. He played one classic after the other - no transitions. „Nirvana - Smells like teen spirit“, „Oasis - Wonderwall“, … As to be expected this went over really well with a crowd aged mostly 30-50. I have to say: It was definitely a vibe. The DJ read the room I guess. We continued downing endless amounts of beer until the Fest ended around 2am. For a while we sat down at a playground, drinking another beer, wondering what to do next. █████ suggested we go to a club called „Baby Angel“. Since that sounded absolutely pornographic, I was intrigued but not convinced. We went there anyways. However, for some reason █████, █████ and I were later than everybody else again! 

████████████████████████████████████████████████████████████

We sat down in front of the club, too tired to enter. It must have been around 4am. Some really drunk young guy walked out of the club and asked us if we had five CHF for the photo booth. We didn’t. █████ (already a hero for what he did just before) said: „Just sit down in the photobooth, I’ll take a picture of you.“ Now that I write it, it almost seems like the situation made sense - it didn't and was absolutely hilarious. Two drunk people, strangers to each other, connecting their last working braincells to come up with this. The next day, █████ showed us the picture of this kid and it’s terrible. I wish I could send it to you now. I like to imagine, that the guy didn’t remember █████ the next day and wondered how this stupid picture of himself came about (█████ airdropped it to him).

We were all tired. █████, █████ and two friends went inside the club. The rest of us went home. Enya and I walked again. I told her about you, about how we met and how we write. I am always happy, when I get the chance to talk to someone about you. Enya asked if I am ready yet for a new relationship. It’s something I ask myself sometimes. I am a little afraid, that when you finally move to █████ and we hang out more, that I discover I am not ready after all. I’m not very in tune with my feelings and I don’t know how to be. Some areas in life I know exactly what I want and some areas in life I have no Idea what I want. I just go along with what happens. But when I don’t know what want I just look at what I do and what I did is wait for you, write you emails, boast to my friends about you, miss you and much more. If I would see someone doing that I would think: „Hey don’t do that, that’s my █████!“ Jokes aside, my actions speak for themselves! I like you and I think it is a great thing that we are together. I’ll be honest: I am still unsure if I love you. Forgive me, but we just haven’t seen each other enough. I just want to be straight with you. Time will tell and I am willing to wait! 

I know you are having the shittiest time with Bürgermeldeamt and Moskau right now. I don’t want you to get the impression that your extended absence is making me doubt. I will be waiting. These things take as long as they have to and I am fine with that. It’s still all kisses and love here and I wish you the best.

I almost forgot: The next day I borught Enya to the Hbf, we said our goodbyes and I did my grocery shopping at Migros. I felt so hungover but at peace with myself. There was piano music softly playing throughout the station and everything around me sounded like a field recording. I felt like I was tripping but in a good way. Afterwards I went swimming with █████; █████ and... █████! Wo came finally came back on Sunday!

[date]
from: █████
to: █████

Dear █████,

I think this might be my last letter. But actually, I don’t know. I might write another one. It just wouldn’t be as long as this one. Unless, of course, I end up writing another long one, which is also possible. I imagine even when we live in the same city, I will probably still write you letters. At that point, they will technically be “fake letters,” because I will no longer be waiting for them in anticipation. But I will probably still pretend to be excited when I receive them, because pretending is usually enough.

I am writing you this letter on Thursday. Sorry for the delay. I was sorting out all kinds of things. And, in case you are wondering, I actually did sort them out. All kinds. Which I found satisfying, because usually I only sort out some kinds. So this was a success.

I liked your letter a lot. When you mentioned Enya, I thought of the singer Enya. Coincidentally, I had just listened to her song right before I started reading your email. My brain reacted by saying “wow, what a coincidence.” Then my brain also said “this coincidence is meaningless.” Which made it pleasant. I also noted that Enya is a rare name. That made the coincidence slightly more valuable, but not by much.

████████████████████████████████████████████████████████████

Now let me guide you through my week.

Friday. I spent the evening with █████. We went to a high cuisine restaurant, as we normally do. It is our family tradition: go to expensive restaurants but pay 50% less because my father is friends with the chef. This is a tradition that combines food with discounts. This time we went to the restaurant of my father’s best friend, who was recently nominated as the top chef in █████. My father, unlike his friend, is no longer ambitious in his career. In the 2000s, he was well-known, a brand chef for a prestigious restaurant chain. He dreamed of Paris, studied English to attend a gastronomy school, but eventually abandoned the dream. At around 50, he discovered philosophy instead. He read Heidegger and Deleuze. We went to open lectures together, but I often fell asleep. I was not passionate about it. Later, he started writing books, which became his new outlet. This meant he fully lost professional interest in cooking. Sometimes I sense regret, like on Friday, when he talked with admiration about how to create a genius recipe. Still, it was a pleasant evening. Afterwards we went home and watched It’s a Wonderful Life. I didn’t like the movie. My father didn’t either. That felt validating.

Saturday. I went for a walk with my friend █████, who is moving to Vienna to start his second Master’s in architecture. We went to a café designed by one of his classmates as her diploma project. She was there, so we talked. █████ had just returned from Barcelona, where he took part in Porta Academy Summer School. He told me it was a mistake to choose the Belgian studio for his final project. The █████ studio was better. I told him it was a sign he should come to █████, since it is full of architects anyway. He laughed and accused me of trying to recruit him to “the evil side,” since I don’t have friends in █████. I agreed. He said that if he ever did an internship, he would definitely come to █████ just to hang out with me, even for six months. I felt very good hearing this. Later we went to a stand-up show. It was hilarious — we were literally crying with laughter.

That same evening, drones hit an oil factory. The entire city lost mobile service. That meant no internet at all. People could only make phone calls. We left the theater after the stand-up and went to a bar. █████ had two dry martinis; I had the best negroni of my life. We stayed until 2 a.m. and then decided to go home. █████, being a gentleman, wanted to walk me home. But here is the thing about █████: the city is divided into parts across several islands. At night, the bridges are raised to let ships pass. We forgot this. So the bridge we needed was open. Normally, this is when you get a taxi. But we couldn’t. There was no internet, so no apps. Nobody knew the taxi phone number by heart. We couldn’t even Google it. We were helpless. Then █████ remembered one of the bridges lowers again for 20 minutes. We ran to it as fast as we could. It was intense. When we crossed, we laughed with happiness. The situation sobered us completely. It felt like we had survived a small-scale disaster. We walked home. █████ stayed at my place. In the morning, he left. I gave him the book I had just read, Tod in Persien, so he could read it too. I told him he must give it back no matter what, because it was very dear to me. It wasn’t. He knew it wasn’t. But he promised anyway, which was nice.

Monday. I arrived in █████. On the first day, I already met many of my friends. I was a bit lost and panicked because I couldn’t plan my life. I didn’t know when I would get the visa, or whether I would be able to come to █████ before my studies. But I knew I had to be in █████ on September 3rd for work.I met Katya and █████ and we went to eat ice cream. I ordered one scoop because I thought two would make me look greedy, but afterwards I regretted not ordering two. Still, I was very happy, mostly because of Katya. She is the kind of friend who, when you explain your problems, does not immediately offer advice but instead just hugs you. This is much more efficient, because advice usually makes me feel worse. She told me everything I do makes sense, which is technically impossible, but emotionally convincing. After that we cooked dinner together, which was less about the food and more about pretending life was already stable again. For a few hours, I actually believed it.

Tuesday. I got a notification that my visa was issued. The notification came in the form of a single sentence on my phone screen. For some reason, that was enough to make me almost cry. I didn’t actually cry, but I came close — my eyes filled with water and I thought, “If one more minor inconvenience happens in the next five minutes, I will probably cry.” But nothing happened, so I didn’t. Still, the feeling of almost-crying was strong enough that I now count it as an emotional event.

The visa meant I could plan again. Before this, the future looked like a white wall — blank, endless, intimidating. Now suddenly it had shapes, like someone drew a door on the wall. The ability to plan even three weeks ahead felt like a luxury product I hadn’t been able to afford until now. I kept thinking about small things I could plan: buying a train ticket, scheduling a haircut, imagining a grocery list. These thoughts felt powerful.

But there was a complication. I had already booked my trip to Germany and promised █████ I would attend the conference. Promises are like contracts, and I am still in the phase of life where I try not to break contracts. So instead of relaxing, I had to arrange everything around it. I bought a ticket to █████ for today, the 28th, so I could collect my student visa on Friday. Then, on Saturday, I will fly to Düsseldorf.

In Düsseldorf, my best friend █████ will meet me. Our plan is to play billiards first, then go to a bar. I don’t actually like billiards very much, but █████ does, and part of friendship is pretending you enjoy activities that you don’t. After that, we will meet friends from █████. They promised to come to Düsseldorf, which is unusual. People from █████ almost never go to hang out in Dusseldorf, unless forced by marriage, death, or military service. So the fact that they are traveling voluntarily feels significant. To me, it is proof that sacrifice exists in friendship.

On Wednesday we gathered in a big group — almost everyone I know in █████. The group was large enough that it felt like a small conference, but without name tags. We went to a wine place. I don’t remember many details from the evening, which usually means it was pleasant but not memorable enough for my brain to file under “long-term storage.”

There were two French guys, █████ and Stephan. Both are studying █████ at Sorbonne, which is in Paris, and they spoke █████ impressively well, although with the kind of French accent that makes every word sound a little more dramatic than intended. I ended up talking more to Stephan, who seemed friendly and invited me to a dinner in Paris with our mutual friends there.

Ironically, I didn’t enjoy talking to █████. I thought he was a snob.

Now I am flying from █████ to █████. Tomorrow I will be in Germany. I feel weird, but satisfied. Finally, I have a plan. In █████, I will start studying on September 18. On October 1, I will move into my room. Then I will try not to burn out, and normalize my study–work life. When I do, there will be nothing extreme left. Just living. Which is exciting.

I don’t have a lot of photos this time. Only one video from █████: me and █████ discussing kebab, while I smoke a cigarette like a woman in her 50s. We look like siblings. Since that day, I haven’t smoked. I ran out of tobacco and didn’t buy more. Maybe my anxiety is lower. Or maybe I am just lazy.

Funnily enough, I also imagined that when you are back, we still write each other these letters like a journal of our shared experiences, our mutual feelings for one another. I would not see them as „fake“ letters.

Thank you for your understanding concerning my little last paragraph from last time. There is a lot in this world that I take lightly. There is a certain enjoyment and even beauty in taking the world in and letting it go. It’s like being in water, swimming, breathing in and out. Everything is quiet, except for the water splashing your ears. And as much as I like moving my body around in a big body of liquid, sometimes you need direction. In that sense, your „little“ expectation for our reunion did please me but I also think, that you shouldn’t content yourself with just that. You deserve to have bigger expectations for me as I have expectations for you. I did not want to give you the impression, that being with you is just me, drifting around aimlessly, doing whatever feels good until I tire out or find another shore. I want to be with you and I want to be there for you. You can trust me to be more for you, than just one day in your life each day. Otherwise our relationship would always be in the shadow of the same white wall you felt, that kept you from planning ahead, when you did not have your visa yet. You can plan ahead with me, I’ll be there.

Your dad quitting his passion, finding another, reminded me of my relationship to architecture. There was definetely a time where I was living and breathing architecture. Now I don’t know. Thankfully architecture is a broad field and I am optimistic about finding a niche, that might awaken a new little passion in me. I know I will not find it in the kind of architecture I am doing now. I also know, that I am ok with the architecture (and money) I  am making now. I just started working. I don’t have to solve everything right now. We’ll see. For now, I just wish I had more time for all my hobbies.

function parseArchive(raw) {
  const parts = raw.split('===== LETTER');
  const letters = [];

  for (let i = 1; i < parts.length; i++) {
    let block = parts[i].trim();

    const firstNewline = block.indexOf('\n');
    if (firstNewline !== -1) {
      block = block.slice(firstNewline + 1).trim();
    }

    const lines = block.split('\n');
    const cleanedLines = [];

    for (let line of lines) {
      const trimmed = line.trim();

      if (
        trimmed === '[date]' ||
        trimmed.startsWith('from:') ||
        trimmed.startsWith('to:')
      ) {
        continue;
      }

      cleanedLines.push(line);
    }

    const cleaned = cleanedLines.join('\n').trim();
    const firstLine = cleanedLines.find(line => line.trim()) || `Letter ${i}`;

    letters.push({
      id: i,
      title: `Letter ${String(i).padStart(2, '0')} — ${firstLine.slice(0, 42)}`,
      body: cleaned
    });
  }

  return letters;
}

function escapeHtml(str) {
  return str
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

/* ARCHIVE LIST */
function renderArchiveList(){
  archiveList.innerHTML = '';

  if (!archiveLetters.length) {
    const empty = document.createElement('div');
    empty.className = 'note';
    empty.textContent = 'archive is empty — rawArchive was not parsed';
    archiveList.appendChild(empty);
    return;
  }

  archiveLetters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'archive-item';
    btn.textContent = letter.title;
    btn.addEventListener('click', () => openLetter(letter.id));
    archiveList.appendChild(btn);
  });
}

function getLetterById(id){
  return archiveLetters.find(l => l.id === id);
}

function openLetter(id){
  const letter = getLetterById(id);
  if(!letter) return;

  windowTitle.textContent = 'letter';
  content.innerHTML = `
    <div class="meta">${escapeHtml(letter.title)}</div>
    <pre>${escapeHtml(letter.body)}</pre>
    <div class="note">anonymized archive view</div>
  `;
}

/* GENERATOR */
function clearWords(){
  document.querySelectorAll('.word').forEach(word => word.remove());
}

function generateWords(){
  clearWords();

  for(let i = 0; i < 120; i++){
    const span = document.createElement('span');
    span.className = 'word';
    span.innerText = randomItem(wordPool);
    span.style.top = Math.random() * 2100 + 'px';
    span.style.left = Math.random() * (timelineCanvas.offsetWidth - 80) + 'px';
    timelineCanvas.appendChild(span);
  }
}

function openGenerator(){
  windowTitle.textContent = 'generator';

  content.innerHTML = `
    <div class="meta">generated letter</div>
    <div>enter a name</div>
    <input id="nameInput" placeholder="Anna" />
    <div class="small-actions">
      <button onclick="startWordSequence()">generate</button>
    </div>
    <div class="note">the words will briefly scatter before the letter appears</div>
  `;
}

function startWordSequence(){
  const input = document.getElementById('nameInput');
  const name = input ? input.value.trim() : 'you';

  generateWords();

  setTimeout(() => {
    clearWords();
    generateLetter(name || 'you');
  }, 3000);
}

function generateLetter(name){
  const used = new Set();

  function pickUnique(){
    const available = phrasePool.filter(p => !used.has(p));
    const chosen = available.length
      ? available[Math.floor(Math.random() * available.length)]
      : phrasePool[Math.floor(Math.random() * phrasePool.length)];
    used.add(chosen);
    return chosen;
  }

  const body = [
    pickUnique(),
    pickUnique(),
    pickUnique(),
    pickUnique(),
    pickUnique(),
    pickUnique(),
    'I miss you.'
  ].join(' ');

  const finalLetter = `Dear ${name},

${body}

Yours,`;

  windowTitle.textContent = 'generated letter';
  content.innerHTML = `
    <div class="meta">generator output</div>
    <pre id="typedLetter"></pre>
    <div class="small-actions">
      <button onclick="openGenerator()">generate another</button>
    </div>
  `;

  typeLetter(finalLetter);
}

function typeLetter(text){
  const target = document.getElementById('typedLetter');
  if(!target) return;

  let i = 0;
  target.innerHTML = '';

  const interval = setInterval(() => {
    i += 1;
    const shown = escapeHtml(text.slice(0, i));
    target.innerHTML = shown + '<span class="cursor">|</span>';

    if(i >= text.length){
      clearInterval(interval);
      target.textContent = text;
    }
  }, 16);
}

/* INTRO */
function openIntro(){
  windowTitle.textContent = 'about';
  content.innerHTML = `
    <div class="meta">about this archive</div>
    <pre>A real e-mail correspondence between two people, one in Zurich and the other in Tiflis, was reduced to symbols, counted, broken apart, and returned as language again.

The letters were shuffled into unstable combinations and asked to gather themselves back into love letters.

The archive on the left contains anonymized letters.
The generator produces new letters from recurring phrases.</pre>
  `;
}

/* DRAGGABLE WINDOW */
const windowEl = document.getElementById('window');
const windowHeader = document.getElementById('windowHeader');

let isDragging = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

windowHeader.addEventListener('mousedown', (e) => {
  isDragging = true;
  const rect = windowEl.getBoundingClientRect();
  dragOffsetX = e.clientX - rect.left;
  dragOffsetY = e.clientY - rect.top;

  windowEl.style.transform = 'none';
  windowEl.style.left = rect.left + 'px';
  windowEl.style.top = rect.top + 'px';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  windowEl.style.left = (e.clientX - dragOffsetX) + 'px';
  windowEl.style.top = (e.clientY - dragOffsetY) + 'px';
});

document.addEventListener('mouseup', () => {
  isDragging = false;
});

/* EVENTS */
openGeneratorBtn.addEventListener('click', openGenerator);
openIntroBtn.addEventListener('click', openIntro);

/* INIT */
renderArchiveList();
openIntro();
</script>
