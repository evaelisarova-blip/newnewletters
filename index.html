<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuffled Letters</title>

<style>
:root{
  --bg:#f7f7f2;
  --text:#6d49ff;
  --muted:#8a8a8a;
  --line:#dcdcdc;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family: monospace;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:260px;
  height:100vh;
  padding:20px;
  border-right:1px dashed var(--line);
  font-size:12px;
}

.logo{
  margin-bottom:20px;
  font-size:14px;
}

.sidebar p{
  line-height:1.4;
}

.links{
  margin-top:20px;
}

.footer{
  position:absolute;
  bottom:20px;
  font-size:11px;
}

/* GRID */
.main{
  margin-left:260px;
  height:100vh;
  position:relative;
}

.grid-line{
  position:absolute;
  top:0;
  height:100%;
  border-left:1px dashed var(--line);
}

.year{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:#999;
}

/* WINDOW */
.window{
  position:absolute;
  top:50%;
  left:30%;
  transform:translateY(-50%);
  width:360px;
  background:white;
  border:1px solid #ccc;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.window-header{
  height:24px;
  background:linear-gradient(#eaeaea,#dcdcdc);
  display:flex;
  align-items:center;
  padding:0 8px;
}

.dots{
  display:flex;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  background:#999;
  border-radius:50%;
}

.title{
  margin:auto;
  font-size:10px;
  color:#555;
}

.window-body{
  padding:20px;
  font-size:12px;
}

/* INPUT */
input{
  width:100%;
  border:none;
  border-bottom:1px solid #aaa;
  background:none;
  padding:6px 0;
  color:var(--text);
  font-family:monospace;
}

button{
  margin-top:10px;
  border:1px solid var(--text);
  background:none;
  color:var(--text);
  padding:6px 10px;
  cursor:pointer;
  font-family:monospace;
}

button:hover{
  background:var(--text);
  color:white;
}

/* LETTER */
pre{
  white-space:pre-wrap;
  line-height:1.6;
}

.word{
  position:absolute;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">/\\__—|-.-</div>

  <p>
    A radically transparent archive<br>
    of correspondence turned into code.
  </p>

  <div class="links">
    Imagine<br>
    Bouchon Studio<br>
    London Short Film Festival<br>
    Park Pictures<br>
    1201.am<br>
    Depop Games<br>
  </div>

  <div class="footer">
    ig: @letters<br>
    email: contact@mail.com
  </div>
</div>

<div class="main" id="main">

  <div class="year">2024</div>

  <!-- GRID -->
  <script>
    for(let i=1;i<6;i++){
      const line=document.createElement('div');
      line.className='grid-line';
      line.style.left=(i*18)+'%';
      document.getElementById('main').appendChild(line);
    }
  </script>

  <!-- WINDOW -->
  <div class="window" id="window">
    <div class="window-header">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="title">generate</div>
    </div>

    <div class="window-body" id="content">
      click to begin
    </div>
  </div>

</div>

<script>
let stage = 0;

const phrases = [
  'I miss you.',
    'Every day is a new day I guess.',
    'I just carry it.',
    'Like a thread stitched gently through every day.',
    'I realized I had nothing to complain about.',
    'Not in a forced way, but in a quiet way.',
    'There is a kind of stillness.',
    'And within that stillness, love moves more freely.',
    'I think this is real.',
    'It doesn’t feel like a coincidence.',
    'I don’t need to worry.',
    'It just is.',
    'I wanted to tell you this.',
    'I don’t know why exactly.',
    'But it felt important.',
    'Even if it’s simple.',
    'Even if it’s obvious.',
    'Still.',
    'I nodded a lot, which felt like the correct response.',
    'Closure had clearly been outsourced.',
    'The only ones who still seem to have it figured out are the cats.',
    'Unbothered. Self-sufficient. Still running the show.',
    'Plans feel less like plans and more like vague suggestions.',
    'The design turned out experimental.',
    'More of a symbolic gesture than a functional object.',
    'Like the movie was bad for us, specifically.',
    'It felt oddly communal.',
    'I think I might be in my dessert prime right now.',
    'Honestly, I got emotionally attached to something insignificant again.',
    'Dogs are good at that, I guess.',
    'I am just rambling in this email.',
    'I am a busy adult, not a lovesick teenager.',
    'This does not support my narrative.',
    'My memory is mush.',
    'Everything is so mush.',
    'Big adventure, small sleep.',
    'That is the version of me you’re getting today.',
    'That’s all folks!',
    'More is more.',
    'I was going to say something meaningful but lost it halfway.',
    'This felt important five minutes ago.',
    'I stand by the emotion, not the structure.',
    'I think you would have laughed at this.',
    'This is probably not helping but I’m sending it anyway.',
    'Somehow this became sincere.',
    'I didn’t plan to say this but here we are.',
    'It feels small but also not small.',
    'I am aware this is slightly ridiculous.',
    'But also kind of true.',
    'I think this counts as communication.',
    'Emotionally this made sense at the time.'
];

const words = ["love","memory","thread","softness","chaos","stillness","distance","letter"];

document.getElementById('window').onclick = () => {
  if(stage === 0){
    generateWords();
    stage = 1;
    setTimeout(showInput,3000);
  }
};

function generateWords(){
  const main = document.getElementById('main');

  document.querySelectorAll('.word').forEach(word => word.remove());

  for(let i = 0; i < 120; i++){
    const span = document.createElement('span');
    span.className = 'word';
    span.innerText = words[Math.floor(Math.random() * words.length)];
    span.style.top = Math.random() * 100 + '%';
    span.style.left = Math.random() * 100 + '%';
    main.appendChild(span);
  }
}

function showInput(){
  document.getElementById('content').innerHTML = `
    <div>enter a name</div>
    <input id="name">
    <button onclick="generateLetter()">generate</button>
  `;
}

function generateLetter(){
  const name=document.getElementById('name').value || 'you';

  let text = `Dear ${name},\n\n`;

  for(let i=0;i<6;i++){
    text += phrases[Math.floor(Math.random()*phrases.length)] + " ";
  }

  text += "\n\nYours,";

  document.getElementById('content').innerHTML = `<pre>${text}</pre>`;
}
</script>

</body>
</html>
